{% extends 'myapp/base.html' %}

{% block content %}
<div class="min-h-[calc(100vh-64px)] flex items-center justify-center bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-xl w-full space-y-8 bg-white p-10 rounded-3xl shadow-xl border border-slate-200">
        <div class="text-center">
            <h2 class="text-3xl font-black text-slate-900 tracking-tighter">Join ReMedi</h2>
            <p class="mt-2 text-sm text-slate-600">Start your journey toward zero-waste healthcare.</p>
        </div>

        <form class="mt-8 space-y-4" method="POST">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                {% for field in form %}
                    <div class="{% if field.name == 'username' or field.name == 'role' %}md:col-span-2{% endif %}">
                        <label class="block text-sm font-bold text-slate-700 mb-1">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>

            <button type="submit" class="w-full mt-6 flex justify-center py-4 px-4 border border-transparent text-base font-bold rounded-2xl text-white bg-slate-900 hover:bg-black transition-all shadow-xl">
                Create Account
            </button>
        </form>

        <div class="relative py-4">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
            <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-slate-500">Already a member?</span></div>
        </div>

        <a href="{% url 'login' %}" class="block text-center text-sm font-bold text-emerald-600 hover:underline">
            Log in to your account
        </a>
    </div>
</div>

<style>
    input, select {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid #e2e8f0;
        background-color: #f8fafc;
        transition: all 0.2s;
    }
    input:focus, select:focus {
        outline: none;
        border-color: #059669;
        box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        background-color: white;
    }
    /* Special styling for the Role dropdown to make it pop */
    select {
        cursor: pointer;
        font-weight: 600;
        color: #059669;
    }
</style>
{% endblock %}
