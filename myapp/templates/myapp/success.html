{% extends 'myapp/base.html' %}

{% block content %}
<div class="card" style="text-align: center; max-width: 600px; margin: auto; border: 2px solid #00796b;">
    <h2 style="color: #00796b;">Reservation Confirmed!</h2>
    <p>You have successfully reserved <strong>{{ medicine.name }}</strong>.</p>
    <p>Please visit your nearest <strong>ReMedi Corner</strong> to pay <strong>{{ medicine.resale_price }} BDT</strong> and collect your medicine.</p>
    <hr>
    <a href="{% url 'corner_map' %}" class="btn">Find Nearest Corner on Map</a>
    <a href="{% url 'marketplace' %}" style="display: block; margin-top: 15px;">Back to Marketplace</a>
</div>
{% endblock %}
