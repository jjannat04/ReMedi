{% extends 'myapp/base.html' %}

{% block content %}
<div class="min-h-screen bg-slate-50 py-12 px-4">
    <div class="max-w-3xl mx-auto">
        
        <!-- Header & Impact Note -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Login to ReMedi</h1>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">

                <!-- Right Side: The Form -->
                <div class="p-8 lg:p-12">
                    <form method="post" class="space-y-6">
                        {% csrf_token %}
                        
                        {% for field in form %}
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">
                                {{ field.label }}
                            </label>
                            <div class="relative">
                                {{ field }}
                            </div>
                            {% if field.errors %}
                                <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                            {% endif %}
                        </div>
                        {% endfor %}

                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-200 transition-all transform hover:-translate-y-1">
                            Log In
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Styling the Django Form Widgets to match Tailwind */
    input, select, textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid #e2e8f0; /* slate-200 */
        background-color: #f8fafc; /* slate-50 */
        transition: all 0.2s;
    }
    input:focus {
        outline: none;
        border-color: #059669; /* emerald-600 */
        box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        background-color: white;
    }
</style>
{% endblock %}
