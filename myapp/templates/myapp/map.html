{% extends 'myapp/base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8">
    <!-- Header Section -->
    <div class="mb-8">
        <h1 class="text-3xl font-extrabold text-slate-800">ReMedi Corners</h1>
        <p class="text-slate-600">Find a verified partner pharmacy to collect your reserved medicine or drop off donations.</p>
    </div>

    <div class="flex flex-col lg:flex-row gap-6 h-[600px]">
        <!-- Sidebar: List of Cities/Locations -->
        <div class="w-full lg:w-1/3 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-y-auto p-4">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4 px-2">Available Locations</h2>
            <div class="space-y-3">
                {% for corner in corners %}
                <button onclick="map.flyTo([{{ corner.latitude }}, {{ corner.longitude }}], 15)" 
                        class="w-full text-left p-4 rounded-xl border border-slate-100 hover:border-emerald-500 hover:bg-emerald-50 transition-all group">
                    <h3 class="font-bold text-slate-800 group-hover:text-emerald-700">{{ corner.name }}</h3>
                    <p class="text-xs text-slate-500 mb-1">{{ corner.address }}</p>
                    <span class="inline-block bg-slate-100 text-slate-600 text-[10px] px-2 py-0.5 rounded-md font-bold uppercase">
                        {{ corner.city }}
                    </span>
                </button>
                {% endfor %}
            </div>
        </div>

        <!-- Map Section -->
        <div class="w-full lg:w-2/3 relative rounded-2xl shadow-lg border-4 border-white overflow-hidden">
            <!-- Leaflet CSS -->
            <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
            
            <div id="map" class="h-full w-full z-0"></div>

            <!-- Leaflet JS -->
            <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

            <script>
                // Initialize Map - Default view centered on Bangladesh
                var map = L.map('map', {
                    zoomControl: false // We'll move it for better UI
                }).setView([23.6850, 90.3563], 7); 

                // Add Zoom Control to the top right
                L.control.zoom({ position: 'topright' }).addTo(map);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);

                // Custom ReMedi Icon (Optional but looks pro)
                var remediIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: "<div style='background-color:#059669; height:12px; width:12px; border-radius:50%; border:2px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.3);'></div>",
                    iconSize: [25, 25],
                    iconAnchor: [6, 6]
                });

                {% for corner in corners %}
                    L.marker([{{ corner.latitude }}, {{ corner.longitude }}], {icon: remediIcon})
                        .addTo(map)
                        .bindPopup("<div class='p-2'><b class='text-emerald-700'>{{ corner.name }}</b><br><small class='text-slate-600'>{{ corner.address }}</small></div>");
                {% endfor %}

                // If there are corners, center the map on the first one
                {% if corners %}
                    map.setView([{{ corners.0.latitude }}, {{ corners.0.longitude }}], 10);
                {% endif %}
            </script>
        </div>
    </div>
</div>

<style>
    /* Fix for Leaflet popups to match our theme */
    .leaflet-popup-content-wrapper {
        border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }
    .leaflet-popup-tip {
        background: white;
    }
</style>
{% endblock %}
